<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Transaction</title>
    <link rel="stylesheet" href="add.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
</head>

<body>
    <header class="app-header">
        <button class="back-btn" onclick="history.back()">← Back</button>
        <h2 class="title">Add Transaction</h2>
    </header>

    <form id="transaction-form" class="transaction-form" onsubmit="handleFormSubmit(event)">

        <label>Title</label>
        <input type="text" id="title" placeholder="e.g. Groceries, Salary" required>

        <label>Type</label>
        <div class="radio-group" id="type">
            <label>
                <input type="radio" name="type" value="expense" checked>
                Expense
            </label>

            <label>
                <input type="radio" name="type" value="income">
                Income
            </label>
        </div>

        <label>Amount</label>
        <input type="number" id="amount" placeholder="e.g. 500" required>

        <label>Date</label>
        <input type="date" id="date" required>

        <label>Category</label>
        <select id="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
            <option value="Salary">Salary</option>
            <option value="Freelance">Freelance</option>
        </select>

        <button type="submit">Save</button>

        <button type="button" onclick="location.href='index.html'">
            Cancel
        </button>

    </form>

    <script src="add.js"></script>
</body>

</html>
